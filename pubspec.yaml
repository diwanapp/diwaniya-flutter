name: diwaniya
description: ديوانية — كل شي تحتاجه لديوانيتك في مكان واحد
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^14.0.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.0
  image_picker: ^1.0.0
  file_picker: ^10.3.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  record: ^6.2.0
  audioplayers: ^6.1.0
  emoji_picker_flutter: ^4.4.0
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  local_auth: ^3.0.1
  open_filex: ^4.7.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/legal/